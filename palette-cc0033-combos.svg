<svg width="1600" height="1380" viewBox="0 0 1600 1380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F7F9"/>
      <stop offset="1" stop-color="#E8EDF2"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1680" height="1460" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1B2430" flood-opacity="0.11"/>
    </filter>
  </defs>

  <rect width="1600" height="1380" fill="url(#bg)"/>

  <text x="90" y="96" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="800" fill="#1E2A35">
    Palettes Around Primary #CC0033
  </text>
  <text x="90" y="138" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="500" fill="#66717C">
    Main brand color stays fixed. We only choose the supporting neutrals and secondary tones around it.
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="700" height="250" rx="30" fill="#FFFFFF"/>
    <text x="110" y="246" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#1F2B36">1. Graphite Steel</text>
    <text x="110" y="282" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#66717C">Best balance for a driver app: masculine, clean, modern</text>

    <rect x="110" y="322" width="96" height="54" rx="16" fill="#CC0033"/>
    <rect x="220" y="322" width="96" height="54" rx="16" fill="#42627D"/>
    <rect x="330" y="322" width="96" height="54" rx="16" fill="#F4F7FA" stroke="#D7DEE5"/>
    <rect x="440" y="322" width="96" height="54" rx="16" fill="#FFFFFF" stroke="#D7DEE5"/>
    <rect x="550" y="322" width="96" height="54" rx="16" fill="#1F2B36"/>
    <rect x="660" y="322" width="96" height="54" rx="16" fill="#6B7883"/>

    <text x="110" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#CC0033">Primary</text>
    <text x="220" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#42627D">Secondary</text>
    <text x="330" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#6B7883">BG</text>
    <text x="440" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#6B7883">Card</text>
    <text x="550" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1F2B36">Text</text>
    <text x="660" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#6B7883">Muted</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="830" y="190" width="700" height="250" rx="30" fill="#FFFFFF"/>
    <text x="870" y="246" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#1E2732">2. Deep Navy</text>
    <text x="870" y="282" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#66717C">Stronger contrast, a little more premium and serious</text>

    <rect x="870" y="322" width="96" height="54" rx="16" fill="#CC0033"/>
    <rect x="980" y="322" width="96" height="54" rx="16" fill="#243B53"/>
    <rect x="1090" y="322" width="96" height="54" rx="16" fill="#F3F6FA" stroke="#D7DEE5"/>
