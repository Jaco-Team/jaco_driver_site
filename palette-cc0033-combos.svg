    <rect x="1310" y="322" width="96" height="54" rx="16" fill="#1B2630"/>
    <rect x="1420" y="322" width="96" height="54" rx="16" fill="#6B7785"/>

    <text x="870" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#CC0033">Primary</text>
    <text x="980" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#243B53">Secondary</text>
    <text x="1090" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#6B7883">BG</text>
    <text x="1200" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#6B7883">Card</text>
    <text x="1310" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1B2630">Text</text>
    <text x="1420" y="402" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#6B7785">Muted</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="490" width="700" height="250" rx="30" fill="#FFFFFF"/>
    <text x="110" y="546" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#2A3138">3. Sand Slate</text>
    <text x="110" y="582" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#66717C">Softer and warmer, less cold than blue-gray solutions</text>

    <rect x="110" y="622" width="96" height="54" rx="16" fill="#CC0033"/>
    <rect x="220" y="622" width="96" height="54" rx="16" fill="#697786"/>
    <rect x="330" y="622" width="96" height="54" rx="16" fill="#F7F4F1" stroke="#D9D5CF"/>
    <rect x="440" y="622" width="96" height="54" rx="16" fill="#FFFFFF" stroke="#D9D5CF"/>
    <rect x="550" y="622" width="96" height="54" rx="16" fill="#2D3136"/>
    <rect x="660" y="622" width="96" height="54" rx="16" fill="#7A726D"/>

    <text x="110" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#CC0033">Primary</text>
    <text x="220" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#697786">Secondary</text>
    <text x="330" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#7A726D">BG</text>
    <text x="440" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#7A726D">Card</text>
    <text x="550" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#2D3136">Text</text>
    <text x="660" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#7A726D">Muted</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="830" y="490" width="700" height="250" rx="30" fill="#FFFFFF"/>
    <text x="870" y="546" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#20282D">4. Concrete Tech</text>
    <text x="870" y="582" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#66717C">Neutral and technical, good if the UI should feel utilitarian</text>

    <rect x="870" y="622" width="96" height="54" rx="16" fill="#CC0033"/>
    <rect x="980" y="622" width="96" height="54" rx="16" fill="#556274"/>
    <rect x="1090" y="622" width="96" height="54" rx="16" fill="#F3F5F7" stroke="#D8DEE4"/>
    <rect x="1200" y="622" width="96" height="54" rx="16" fill="#FFFFFF" stroke="#D8DEE4"/>
    <rect x="1310" y="622" width="96" height="54" rx="16" fill="#20252B"/>
    <rect x="1420" y="622" width="96" height="54" rx="16" fill="#7A838D"/>

    <text x="870" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#CC0033">Primary</text>
    <text x="980" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#556274">Secondary</text>
    <text x="1090" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#7A838D">BG</text>
    <text x="1200" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#7A838D">Card</text>
    <text x="1310" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#20252B">Text</text>
    <text x="1420" y="702" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#7A838D">Muted</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="790" width="1460" height="270" rx="30" fill="#FFFFFF"/>
    <text x="110" y="846" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#262C28">5. Olive Graphite</text>
    <text x="110" y="882" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" fill="#66717C">Unexpected, calmer, more mature. Good if you want the red to stand out stronger.</text>

    <rect x="110" y="922" width="96" height="54" rx="16" fill="#CC0033"/>
    <rect x="220" y="922" width="96" height="54" rx="16" fill="#667464"/>
    <rect x="330" y="922" width="96" height="54" rx="16" fill="#F6F7F3" stroke="#DADFD3"/>
    <rect x="440" y="922" width="96" height="54" rx="16" fill="#FFFFFF" stroke="#DADFD3"/>
    <rect x="550" y="922" width="96" height="54" rx="16" fill="#262C28"/>
    <rect x="660" y="922" width="96" height="54" rx="16" fill="#70776B"/>

    <text x="110" y="1002" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#CC0033">Primary</text>
    <text x="220" y="1002" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#667464">Secondary</text>
    <text x="330" y="1002" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#70776B">BG</text>
    <text x="440" y="1002" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#70776B">Card</text>
    <text x="550" y="1002" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#262C28">Text</text>
    <text x="660" y="1002" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#70776B">Muted</text>

    <text x="860" y="935" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#1E2A35">My shortlist</text>
    <text x="860" y="976" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#4B5863">1. Graphite Steel</text>
    <text x="860" y="1010" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#4B5863">2. Deep Navy</text>
    <text x="860" y="1044" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#4B5863">3. Sand Slate</text>
  </g>

  <text x="90" y="1160" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#1E2A35">
    Rule of thumb
  </text>
  <text x="90" y="1202" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#66717C">
    Keep #CC0033 as an action color, not as a background color for large surfaces.
  </text>
  <text x="90" y="1238" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="500" fill="#66717C">
    The calmer the surrounding grays and secondary tones are, the stronger and cleaner the brand red will feel.
  </text>
</svg>
